version: '3.9'

services:
  # Infrastructure
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: silverlink
      POSTGRES_PASSWORD: silverlink_secret
      POSTGRES_DB: silverlink
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U silverlink"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7-alpine
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: silverlink
      DOCKER_INFLUXDB_INIT_PASSWORD: silverlink_secret
      DOCKER_INFLUXDB_INIT_ORG: silverlink
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: silverlink-influx-token
    volumes:
      - influx_data:/var/lib/influxdb2
    ports:
      - "8086:8086"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka

  mosquitto:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./iot/mqtt-broker/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  # Application Services
  api-gateway:
    build: ./services/api-gateway
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  device-management:
    build: ./services/device-management
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  telemetry-ingestion:
    build: ./services/telemetry-ingestion
    ports:
      - "3002:3002"
    env_file: .env
    depends_on:
      - mosquitto
      - kafka
      - influxdb
    restart: unless-stopped

  alert-processing:
    build: ./services/alert-processing
    ports:
      - "3003:3003"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  user-profile:
    build: ./services/user-profile
    ports:
      - "3004:3004"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  notification:
    build: ./services/notification
    ports:
      - "3005:3005"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  analytics:
    build: ./services/analytics
    ports:
      - "3006:3006"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_started
    restart: unless-stopped

  emergency-response:
    build: ./services/emergency-response
    ports:
      - "3007:3007"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  # IoT Device Simulator (dev only)
  device-simulator:
    build: ./iot/device-simulator
    env_file: .env
    depends_on:
      - mosquitto
    profiles:
      - dev
    restart: unless-stopped

volumes:
  postgres_data:
  influx_data:
  redis_data:
  zookeeper_data:
  kafka_data:
  mosquitto_data:
  mosquitto_log:
