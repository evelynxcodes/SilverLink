openapi: 3.0.3
info:
  title: SilverLink API
  description: |
    SilverLink — Maxis 5G Connected Elderly Safety Platform

    All routes except `/auth/register` and `/auth/login` require a Bearer JWT token.
    The JWT is issued on login and carries `userId`, `email`, and `role`.
  version: 1.0.0
  contact:
    name: SilverLink Team
    email: silverlink@maxis.com.my

servers:
  - url: http://localhost:3000
    description: Local development (via API Gateway)

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        phone: { type: string }
        name: { type: string }
        role: { type: string, enum: [FAMILY, CAREGIVER, ADMIN, EMERGENCY] }
        created_at: { type: string, format: date-time }

    ElderlyProfile:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        nric: { type: string }
        date_of_birth: { type: string, format: date }
        gender: { type: string }
        blood_type: { type: string }
        medical_conditions: { type: array, items: { type: string } }
        medications: { type: array, items: { type: string } }
        home_address: { type: string }
        home_lat: { type: number }
        home_lng: { type: number }
        safe_zone_radius: { type: integer }
        subscription_tier: { type: string, enum: [BASIC, STANDARD, PREMIUM] }

    Device:
      type: object
      properties:
        id: { type: string, format: uuid }
        device_serial: { type: string }
        type: { type: string, enum: [WRISTBAND, HOME_HUB, PANIC_BUTTON] }
        elderly_profile_id: { type: string, format: uuid }
        firmware_version: { type: string }
        battery_level: { type: integer }
        status: { type: string, enum: [ONLINE, OFFLINE, ALERT, LOW_BATTERY] }
        last_seen_at: { type: string, format: date-time }

    Alert:
      type: object
      properties:
        id: { type: string, format: uuid }
        elderly_profile_id: { type: string, format: uuid }
        device_id: { type: string, format: uuid }
        type: { type: string, enum: [FALL, HEART_RATE_HIGH, HEART_RATE_LOW, SPO2_LOW, SOS, INACTIVITY, WANDERING, STOVE_ON, DOOR_OPEN_NIGHT] }
        severity: { type: string, enum: [LOW, MEDIUM, HIGH, CRITICAL] }
        status: { type: string, enum: [OPEN, ACKNOWLEDGED, RESOLVED, FALSE_POSITIVE] }
        title: { type: string }
        description: { type: string }
        location_lat: { type: number }
        location_lng: { type: number }
        ml_confidence: { type: number }
        triggered_at: { type: string, format: date-time }

    EmergencyCase:
      type: object
      properties:
        id: { type: string, format: uuid }
        alert_id: { type: string, format: uuid }
        elderly_profile_id: { type: string, format: uuid }
        status: { type: string, enum: [TRIGGERED, DISPATCHED, EN_ROUTE, ON_SCENE, RESOLVED] }
        responders: { type: array, items: { type: object } }
        dispatch_time: { type: string, format: date-time }
        arrival_time: { type: string, format: date-time }
        resolved_at: { type: string, format: date-time }

    RiskScore:
      type: object
      properties:
        elderlyId: { type: string, format: uuid }
        riskScore: { type: integer, minimum: 0, maximum: 100 }
        riskLevel: { type: string, enum: [LOW, MEDIUM, HIGH, CRITICAL] }
        breakdown:
          type: object
          properties:
            ageScore: { type: number }
            conditionScore: { type: number }
            alertScore: { type: number }
            fallScore: { type: number }
        recommendations: { type: array, items: { type: string } }

    Error:
      type: object
      properties:
        error: { type: string }

paths:
  # Auth
  /api/v1/auth/register:
    post:
      tags: [Auth]
      security: []
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, phone, name, password]
              properties:
                email: { type: string, format: email }
                phone: { type: string, example: "+60123456789" }
                name: { type: string }
                password: { type: string, minLength: 8 }
                role: { type: string, enum: [FAMILY, CAREGIVER] }
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: '#/components/schemas/User' }
                  token: { type: string }
        "409": { description: Email or phone already exists }

  /api/v1/auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: '#/components/schemas/User' }
                  token: { type: string }
        "401": { description: Invalid credentials }

  # Elderly Profiles
  /api/v1/elderly:
    post:
      tags: [Elderly Profiles]
      summary: Create an elderly profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, dateOfBirth]
              properties:
                name: { type: string }
                nric: { type: string }
                dateOfBirth: { type: string, format: date }
                gender: { type: string }
                bloodType: { type: string }
                medicalConditions: { type: array, items: { type: string } }
                medications: { type: array, items: { type: string } }
                homeAddress: { type: string }
                homeLat: { type: number }
                homeLng: { type: number }
                safeZoneRadius: { type: integer, default: 200 }
                subscriptionTier: { type: string, enum: [BASIC, STANDARD, PREMIUM] }
      responses:
        "201":
          description: Elderly profile created
          content:
            application/json:
              schema:
                type: object
                properties:
                  elderly: { $ref: '#/components/schemas/ElderlyProfile' }

  /api/v1/elderly/mine:
    get:
      tags: [Elderly Profiles]
      summary: Get all elderly profiles linked to the current user
      responses:
        "200":
          description: List of elderly profiles
          content:
            application/json:
              schema:
                type: object
                properties:
                  elderly: { type: array, items: { $ref: '#/components/schemas/ElderlyProfile' } }

  /api/v1/elderly/{elderlyId}:
    get:
      tags: [Elderly Profiles]
      summary: Get elderly profile by ID
      parameters:
        - name: elderlyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Elderly profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  elderly: { $ref: '#/components/schemas/ElderlyProfile' }
        "404": { description: Not found }

  # Devices
  /api/v1/devices/register:
    post:
      tags: [Devices]
      summary: Register a new IoT device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deviceSerial, type, elderlyProfileId]
              properties:
                deviceSerial: { type: string, example: "SL-WB-2024-001234" }
                type: { type: string, enum: [WRISTBAND, HOME_HUB, PANIC_BUTTON] }
                elderlyProfileId: { type: string, format: uuid }
                maxisSimIccid: { type: string }
      responses:
        "201":
          description: Device registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  device: { $ref: '#/components/schemas/Device' }

  /api/v1/devices/elderly/{elderlyId}:
    get:
      tags: [Devices]
      summary: Get all devices for an elderly person
      parameters:
        - name: elderlyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: List of devices
          content:
            application/json:
              schema:
                type: object
                properties:
                  devices: { type: array, items: { $ref: '#/components/schemas/Device' } }

  /api/v1/devices/{deviceId}/ota:
    post:
      tags: [Devices]
      summary: Schedule an OTA firmware update
      parameters:
        - name: deviceId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetVersion, firmwareUrl, checksum]
              properties:
                targetVersion: { type: string, example: "2.2.0" }
                firmwareUrl: { type: string, format: uri }
                checksum: { type: string, description: SHA256 hex, minLength: 64, maxLength: 64 }
      responses:
        "202":
          description: OTA job scheduled and dispatched to device via MQTT

  # Alerts
  /api/v1/alerts:
    get:
      tags: [Alerts]
      summary: List alerts with filters
      parameters:
        - name: elderlyId
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string, enum: [OPEN, ACKNOWLEDGED, RESOLVED, FALSE_POSITIVE] }
        - name: severity
          in: query
          schema: { type: string, enum: [LOW, MEDIUM, HIGH, CRITICAL] }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: object
                properties:
                  alerts: { type: array, items: { $ref: '#/components/schemas/Alert' } }

  /api/v1/alerts/{alertId}/acknowledge:
    patch:
      tags: [Alerts]
      summary: Acknowledge an alert
      parameters:
        - name: alertId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Alert acknowledged

  /api/v1/alerts/{alertId}/resolve:
    patch:
      tags: [Alerts]
      summary: Resolve or mark false positive
      parameters:
        - name: alertId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                isFalsePositive: { type: boolean, default: false }
      responses:
        "200":
          description: Alert resolved

  # Analytics
  /api/v1/analytics/{elderlyId}/vitals:
    get:
      tags: [Analytics]
      summary: Get vitals trend (heart rate, SpO2, body temp)
      parameters:
        - name: elderlyId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: hours
          in: query
          schema: { type: integer, default: 24, maximum: 168 }
      responses:
        "200":
          description: Time-series vitals data from InfluxDB

  /api/v1/analytics/{elderlyId}/activity:
    get:
      tags: [Analytics]
      summary: Get daily step count and activity summary
      parameters:
        - name: elderlyId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: days
          in: query
          schema: { type: integer, default: 7, maximum: 30 }
      responses:
        "200":
          description: Activity summary per day

  /api/v1/analytics/{elderlyId}/location:
    get:
      tags: [Analytics]
      summary: Get location trail
      parameters:
        - name: elderlyId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: hours
          in: query
          schema: { type: integer, default: 8, maximum: 48 }
      responses:
        "200":
          description: GPS trail data points

  /api/v1/analytics/{elderlyId}/risk-score:
    get:
      tags: [Analytics]
      summary: Compute health risk score (0-100) with breakdown and recommendations
      parameters:
        - name: elderlyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Risk assessment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RiskScore' }

  # Emergency Response
  /api/v1/emergency/trigger:
    post:
      tags: [Emergency Response]
      summary: Manually trigger emergency response for an alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [alertId, elderlyProfileId]
              properties:
                alertId: { type: string, format: uuid }
                elderlyProfileId: { type: string, format: uuid }
                dispatchAmbulance: { type: boolean, default: false }
                notifyPdrm: { type: boolean, default: false }
      responses:
        "201":
          description: Emergency case created
          content:
            application/json:
              schema:
                type: object
                properties:
                  emergencyCase: { $ref: '#/components/schemas/EmergencyCase' }

  /api/v1/emergency/{caseId}:
    get:
      tags: [Emergency Response]
      summary: Get emergency case status
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Emergency case details

  /api/v1/emergency/{caseId}/status:
    patch:
      tags: [Emergency Response]
      summary: Update emergency case status (for responders)
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [DISPATCHED, EN_ROUTE, ON_SCENE, RESOLVED] }
                notes: { type: string }
      responses:
        "200":
          description: Case status updated
